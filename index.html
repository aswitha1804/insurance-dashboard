<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance SafeGuard | Secure Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-body">
    <div class="particles-bg"></div>
    <div class="login-container">
        <div class="login-card glass-effect">
            <div class="login-header">
                <div class="logo-animation">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2>Insurance SafeGuard</h2>
                <p>Advanced Analytics Portal</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email address" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fas fa-eye-slash toggle-password" style="cursor: pointer; margin-left: auto;"></i>
                </div>
                <button type="submit" class="login-btn">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <div class="demo-hint">
                    <i class="fas fa-info-circle"></i> Demo: any email & password (min 3 chars)
                </div>
            </form>
            <div class="security-badge">
                <i class="fas fa-lock"></i> SSL Secured | Enterprise Grade
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
